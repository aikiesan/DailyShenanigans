<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Shenanigans</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-title">
      <div>
        <h1>🌱 Daily Shenanigans</h1>
        <div class="tagline">Registro diário de Lucas Cerejo</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="btn-hoje">+ Hoje</button>
    </div>
  </header>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- MAIN -->
  <main>

    <!-- ── ARCHIVE VIEW ── -->
    <div id="archive-view">
      <div class="archive-header">
        <h2>📅 Registros</h2>
      </div>

      <div class="entries-grid" id="entries-grid">
        <!-- Cards rendered by JS -->
      </div>

      <!-- Import / Export -->
      <div class="io-bar">
        <span>Dados:</span>
        <button class="btn btn-secondary btn-sm" id="btn-export">⬇ Exportar JSON</button>
        <button class="btn btn-secondary btn-sm" id="btn-import">⬆ Importar JSON</button>
      </div>
    </div>

    <!-- ── EDITOR VIEW ── -->
    <div id="editor-view">

      <div class="editor-header">
        <div class="editor-date" id="editor-date"></div>
        <div class="editor-actions">
          <button class="btn btn-secondary" id="btn-back">← Voltar</button>
          <button class="btn btn-teal" id="btn-save-entry">💾 Salvar rascunho</button>
          <button class="btn btn-primary" id="btn-save-file">📂 Salvar arquivo</button>
        </div>
      </div>

      <!-- To-do List -->
      <div class="section section--todo">
        <div class="section-header">
          <div class="section-label">
            <span class="section-accent"></span>
            ✅ Lista de tarefas
          </div>
        </div>
        <div class="section-body">
          <div class="todo-input-row">
            <input type="text" id="todo-input" placeholder="Adicionar tarefa e pressionar Enter…" autocomplete="off" />
            <button class="btn btn-primary btn-sm" id="btn-add-todo">+ Adicionar</button>
          </div>
          <ul class="todo-list" id="todo-list"></ul>
        </div>
      </div>

      <!-- Pesquisa & Academia -->
      <div class="section section--pesquisa">
        <div class="section-header">
          <div class="section-label">
            <span class="section-accent"></span>
            🔬 Pesquisa &amp; Academia
          </div>
        </div>
        <div class="section-body">
          <textarea
            class="section-textarea"
            id="textarea-pesquisa"
            placeholder="Artigos, orientações, CP2B Maps, eventos, registros INPI, reuniões…"
          ></textarea>
        </div>
      </div>

      <!-- Projetos Dev -->
      <div class="section section--dev">
        <div class="section-header">
          <div class="section-label">
            <span class="section-accent"></span>
            💻 Projetos Dev
          </div>
        </div>
        <div class="section-body">
          <textarea
            class="section-textarea"
            id="textarea-dev"
            placeholder="Código escrito, pull requests, bugs resolvidos, ideias técnicas…"
          ></textarea>
        </div>
      </div>

      <!-- Notas Livres -->
      <div class="section section--notas">
        <div class="section-header">
          <div class="section-label">
            <span class="section-accent"></span>
            📝 Notas Livres
          </div>
        </div>
        <div class="section-body">
          <textarea
            class="section-textarea"
            id="textarea-notas"
            placeholder="Reflexões, ideias, leituras, observações do dia…"
          ></textarea>
        </div>
      </div>

      <!-- Conquistas -->
      <div class="section section--conquistas">
        <div class="section-header">
          <div class="section-label">
            <span class="section-accent"></span>
            ⭐ Conquistas do dia
          </div>
        </div>
        <div class="section-body">
          <div class="conquistas-list" id="conquistas-list"></div>
          <div class="conquistas-input-row">
            <input type="text" id="conquista-input" placeholder="Ex: Submeteu abstract IACBR 2026…" autocomplete="off" />
            <button class="btn btn-green btn-sm" id="btn-add-conquista">+ Adicionar</button>
          </div>
        </div>
      </div>

    </div><!-- /editor-view -->

  </main>

  <!-- FLOATING STATUS BAR -->
  <div class="floating-bar hidden" id="floating-bar">
    <div class="draft-indicator">
      <div class="draft-dot" id="draft-dot"></div>
      <span id="draft-label">Rascunho não salvo</span>
    </div>
    <button class="btn btn-primary btn-sm" id="btn-save-file-float" onclick="saveEntryAndFile()">📂 Salvar arquivo</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
